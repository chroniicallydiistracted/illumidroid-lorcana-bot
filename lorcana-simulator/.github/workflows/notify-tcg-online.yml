name: Notify the-card-goat-online

on:
  push:
    branches: [main, production]
  # Manual trigger for dry-runs during rollout / debugging.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    name: Fire engine-bump dispatch
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch
        env:
          TCG_SYNC_TOKEN: ${{ secrets.PAT_TOKEN }}
          ENGINE: lorcana
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          payload=$(jq -nc \
            --arg engine "$ENGINE" \
            --arg branch "$BRANCH" \
            --arg sha "$SHA" \
            --arg repo "$SOURCE_REPO" \
            '{event_type: "engine-bump", client_payload: {engine: $engine, branch: $branch, sha: $sha, repo: $repo}}')

          curl --fail-with-body -sS \
            -X POST \
            -H "Authorization: Bearer ${TCG_SYNC_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/TheCardGoat/the-card-goat-online/dispatches \
            -d "$payload"
